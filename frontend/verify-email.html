<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verify Email — OES</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">
<div style="text-align:center;max-width:400px;padding:40px">
  <div id="icon" style="font-size:4rem;margin-bottom:20px">⏳</div>
  <h2 id="title">Verifying Email...</h2>
  <p id="msg" class="text-muted mt-2">Please wait.</p>
  <div id="action" class="mt-3"></div>
</div>
<script src="js/app.js"></script>
<script>
async function verify(){
  const token=new URLSearchParams(location.search).get('token');
  if(!token){ document.getElementById('icon').textContent='❌'; document.getElementById('title').textContent='Invalid Link'; document.getElementById('msg').textContent='No verification token found.'; return; }
  try{
    await api.get('/auth/verify-email?token='+token);
    document.getElementById('icon').textContent='✅';
    document.getElementById('title').textContent='Email Verified!';
    document.getElementById('msg').textContent='Your account is now active. You can sign in.';
    document.getElementById('action').innerHTML='<a href="/index.html" class="btn btn-primary">Sign In Now</a>';
  }catch(err){
    document.getElementById('icon').textContent='❌';
    document.getElementById('title').textContent='Verification Failed';
    document.getElementById('msg').textContent=err.message||'Link may be expired.';
    document.getElementById('action').innerHTML='<a href="/index.html" class="btn btn-secondary">Back to Login</a>';
  }
}
verify();
</script>
</body>
</html>
